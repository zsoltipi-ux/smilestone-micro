<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmileStone Micro</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 90'><path d='M48 2C38 0 24 2 12 8 4 14 1 24 2 38 4 52 14 68 28 85 30 88 32 86 36 78 42 66 52 42 54 22 53 10 48 2 48 2z' fill='%230097a7'/><path d='M52 6C46 10 42 18 44 30 46 42 52 56 60 78 64 86 66 90 68 88 72 80 88 56 96 30 98 14 88 2 68 0 58 0 52 6 52 6z' fill='%2300b8d4'/></svg>">
<style>
:root{--c:#00b8d4;--ch:#0097a7;--cl:#26c6da;--cd:#006064;--sb:#0d1b2a;--bg:#f4f8fb;--wh:#fff;--bd:#dce6f0;--tx:#0d1b2a;--tl:#5c7080;--ok:#10b981;--inf:#0077b6;--gr:#94a3b8;--sh:0 1px 4px rgba(0,0,0,.06);--rad:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--c);text-decoration:none;cursor:pointer}a:hover{color:var(--ch)}
button{border:none;cursor:pointer;font-family:inherit;transition:all .2s}
input,select,textarea{font-family:inherit;border:1.5px solid var(--bd);border-radius:var(--rad);padding:0 14px;height:44px;transition:all .2s;width:100%;font-size:1rem;background:#fff;color:var(--tx)}
textarea{padding:14px;height:auto;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(0,184,212,.12)}
.card{background:var(--wh);border-radius:12px;padding:24px;box-shadow:var(--sh)}
.badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:.85rem;font-weight:600}
.b-ok{background:rgba(16,185,129,.1);color:var(--ok)}.b-inf{background:rgba(0,184,212,.1);color:var(--ch)}.b-gr{background:rgba(148,163,184,.1);color:var(--gr)}
.btn{height:44px;padding:0 24px;border-radius:var(--rad);font-weight:600;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;transition:all .15s}
.btn-p{background:var(--c);color:#fff}.btn-p:hover{background:var(--ch)}
.btn-s{background:#fff;color:var(--tx);border:2px solid var(--bd)}.btn-s:hover{border-color:var(--c);color:var(--c)}
.btn-o{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.5)}.btn-o:hover{background:#fff;color:var(--ch);border-color:#fff}
.btn-sm{height:36px;padding:0 16px;font-size:.85rem}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap24{gap:24px}
.wrap{flex-wrap:wrap}.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.col{flex-direction:column}.w100{width:100%}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}.mb32{margin-bottom:32px}
.mt16{margin-top:16px}.mt24{margin-top:24px}
.tac{text-align:center}.tar{text-align:right}
.hidden{display:none!important}

/* HERO */
.hero{background:linear-gradient(135deg,#012a4a 0%,#01497c 30%,#0077b6 60%,var(--c) 100%);color:#fff;padding:80px 24px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,184,212,.12) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-25%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(0,151,167,.1) 0%,transparent 70%);border-radius:50%}
.hero>*{position:relative;z-index:1}
.hero-logo{margin:0 auto 20px}
.hero h1{font-size:2.6rem;margin-bottom:6px;font-weight:800;letter-spacing:-.5px}.hero .sub{font-size:1.2rem;margin-bottom:10px;opacity:.9;font-weight:500}
.hero .desc{font-size:1rem;margin-bottom:36px;max-width:520px;margin-left:auto;margin-right:auto;opacity:.8;line-height:1.7}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:820px;margin:0 auto;padding:0 16px}
.fc{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:24px 18px;border-radius:12px;text-align:center;border:1px solid rgba(255,255,255,.12);transition:transform .2s}
.fc:hover{transform:translateY(-2px)}
.fc .ico{font-size:2.2rem;margin-bottom:8px}.fc h3{font-size:.98rem;margin-bottom:4px;color:#fff}.fc p{color:rgba(255,255,255,.75);font-size:.85rem;line-height:1.5}

/* AUTH */
.auth{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#f4f8fb 0%,#e3edf7 100%)}
.auth-card{background:#fff;border-radius:16px;padding:44px 32px;box-shadow:0 8px 32px rgba(0,0,0,.07);max-width:420px;width:100%}
.auth-card .auth-logo{text-align:center;margin-bottom:28px}
.auth-card h1{text-align:center;margin-bottom:28px;font-size:1.5rem;color:var(--tx)}
.fg{margin-bottom:18px}.fg label{display:block;margin-bottom:6px;font-weight:600;font-size:.92rem;color:var(--tx)}

/* LAYOUT */
.layout{display:flex;min-height:100vh}
.side{width:250px;background:var(--sb);color:#fff;padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;z-index:100}
.side-brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.side-brand-text{font-size:.95rem;font-weight:700;letter-spacing:-.2px;color:rgba(255,255,255,.92)}
.side-nav{flex:1;padding:8px 10px}
.si{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;margin-bottom:1px;background:transparent;color:rgba(255,255,255,.6);border-radius:8px;text-align:left;font-size:.9rem;border:none;cursor:pointer;position:relative;transition:all .12s}
.si:hover{background:rgba(255,255,255,.07);color:#fff}.si.act{background:var(--c);color:#fff}
.si.lk{opacity:.4;cursor:not-allowed}
.si .tip{visibility:hidden;background:#1f2937;color:#fff;text-align:center;padding:5px 10px;border-radius:6px;position:absolute;z-index:9;bottom:120%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.78rem;opacity:0;transition:opacity .2s;pointer-events:none}
.si .tip::after{content:"";position:absolute;top:100%;left:50%;margin-left:-5px;border:5px solid transparent;border-top-color:#1f2937}
.si.lk:hover .tip{visibility:visible;opacity:1}
.side-div{height:1px;background:rgba(255,255,255,.05);margin:6px 10px}
.side-bot{padding:10px;border-top:1px solid rgba(255,255,255,.05);margin-top:auto}
.main{flex:1;overflow-y:auto;min-width:0}
.mh{background:#fff;padding:16px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.mh h2{font-size:1.25rem;white-space:nowrap}
.mb{padding:20px 24px}
.sinp{width:260px;max-width:100%}

/* FILTERS & TABLE */
.ftabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.ft{padding:7px 14px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;color:var(--tx);font-weight:600;cursor:pointer;font-size:.86rem;transition:all .12s}
.ft.act{background:var(--c);color:#fff;border-color:var(--c)}.ft:hover{border-color:var(--c)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
thead{background:var(--bg)}th{padding:12px 14px;text-align:left;font-weight:700;border-bottom:1px solid var(--bd);font-size:.82rem;color:var(--tl);text-transform:uppercase;letter-spacing:.4px}
td{padding:13px 14px;border-bottom:1px solid var(--bd);font-size:.92rem}tbody tr{transition:background .12s;cursor:pointer}tbody tr:hover{background:#f0f8ff}
tbody tr:last-child td{border-bottom:none}
.oid{color:var(--c);font-weight:600}.oid:hover{text-decoration:underline}
.pgn{text-align:right;color:var(--tl);font-size:.85rem;margin-top:12px}

/* DETAIL */
.bk{display:inline-flex;align-items:center;gap:6px;margin-bottom:18px;color:var(--c);font-weight:600;cursor:pointer;font-size:.9rem}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.ir{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd);font-size:.92rem}.ir:last-child{border-bottom:none}
.il{font-weight:600}.iv{color:var(--tl);text-align:right}
.ct{font-size:1rem;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd);color:var(--tx)}
.tl{list-style:none}.tli{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--bd)}.tli:last-child{border-bottom:none}
.tla{width:34px;height:34px;border-radius:50%;background:var(--c);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:.82rem}
.tlc .nm{font-weight:600;font-size:.9rem}.tlc .dt{font-size:.8rem;color:var(--tl)}.tlc .tt{margin-top:3px;font-size:.9rem}

/* WIZARD */
.wiz{max-width:760px;margin:0 auto}
.steps{display:flex;justify-content:center;gap:28px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--bd)}
.step{width:42px;height:42px;border-radius:50%;background:var(--bd);color:var(--tl);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;transition:all .2s}
.step.act{background:var(--c);color:#fff}.step.done{background:var(--ok);color:#fff}
.wc{background:#fff;border-radius:12px;padding:28px;box-shadow:var(--sh);margin-bottom:20px}.wc h2{font-size:1.15rem;margin-bottom:20px;color:var(--tx)}

/* TOOTH CHART */
.tc{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.tc-t{font-size:1rem;font-weight:700;margin-bottom:14px}
.tg{display:grid;grid-template-columns:repeat(8,1fr) 4px repeat(8,1fr);gap:3px;margin-bottom:10px}
.tb{width:100%;aspect-ratio:1;border-radius:6px;border:2px solid var(--bd);background:#fff;color:var(--tx);font-weight:600;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.tb:hover{background:#e0f7fa;border-color:var(--c)}.tb.sel{background:var(--c);color:#fff;border-color:var(--ch)}
.tdv{background:var(--bd)}
.thr{grid-column:1/-1;height:2px;background:var(--bd)}
.tql{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.8rem;color:var(--tl);text-align:center;margin-top:8px}
.st{background:var(--bg);padding:10px 12px;border-radius:8px;margin-top:10px;font-size:.86rem;color:var(--tl)}
.pi{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.pd{background:none;color:#ef4444;font-size:1rem;cursor:pointer;padding:4px 8px;border:none}
.drop{border:2px dashed var(--bd);border-radius:8px;padding:24px;text-align:center;background:var(--bg);cursor:pointer;color:var(--tl);font-size:.9rem}
.suc{max-width:480px;margin:0 auto;text-align:center}.suc .si2{font-size:3rem;margin-bottom:14px}
.suc h2{font-size:1.3rem;margin-bottom:8px}.suc p{color:var(--tl);margin-bottom:22px}

/* AI MODE */
.mode-pick{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:600px;margin:0 auto}
.mp-card{background:#fff;border-radius:14px;padding:32px 22px;box-shadow:var(--sh);cursor:pointer;border:2px solid transparent;transition:all .2s;text-align:center}
.mp-card:hover{border-color:var(--c);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,184,212,.1)}
.mp-card .mp-ico{font-size:2.4rem;margin-bottom:12px}.mp-card h3{font-size:1.05rem;margin-bottom:5px;color:var(--tx)}.mp-card p{color:var(--tl);font-size:.86rem;line-height:1.5}
.ai-box{background:#fff;border-radius:12px;padding:28px;box-shadow:var(--sh);max-width:760px;margin:0 auto}
.ai-box h2{font-size:1.15rem;margin-bottom:6px;color:var(--tx)}.ai-box .ai-sub{color:var(--tl);margin-bottom:18px;font-size:.9rem}
.ai-ta{width:100%;min-height:150px;border:2px solid var(--bd);border-radius:var(--rad);padding:14px;font-size:1rem;line-height:1.7;resize:vertical;font-family:inherit}
.ai-ta:focus{border-color:var(--c);box-shadow:0 0 0 3px rgba(0,184,212,.1);outline:none}
.ai-ta::placeholder{color:#94a3b8}
.ai-hint{background:var(--bg);border-radius:8px;padding:12px 14px;margin-top:12px;font-size:.84rem;color:var(--tl);line-height:1.6}
.ai-hint strong{color:var(--tx)}
.ai-loading{text-align:center;padding:60px 20px}
.ai-loading .spinner{width:42px;height:42px;border:4px solid var(--bd);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-result{background:#fff;border-radius:12px;padding:28px;box-shadow:var(--sh);max-width:760px;margin:0 auto}
.ai-result h2{font-size:1.15rem;margin-bottom:18px;color:var(--tx)}
.ai-parsed{background:linear-gradient(135deg,#e0f7fa 0%,#f4f8fb 100%);border:1px solid rgba(0,184,212,.18);border-radius:var(--rad);padding:18px;margin-bottom:18px}
.ai-parsed .ap-title{font-weight:700;color:var(--ch);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-field{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,184,212,.1);font-size:.92rem}.ai-field:last-child{border:none}
.ai-field .af-l{font-weight:600;color:var(--tx)}.ai-field .af-v{color:var(--tl);text-align:right;max-width:60%}
.ai-edit-note{font-size:.82rem;color:var(--tl);text-align:center;margin-bottom:12px;font-style:italic}

/* MOBILE HAMBURGER */
.ham{display:none;background:none;border:none;color:#fff;font-size:1.4rem;padding:8px;cursor:pointer;z-index:101;line-height:1}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.mob-overlay.show{display:block}
.mob-header{display:none;align-items:center;justify-content:space-between;background:var(--sb);padding:12px 16px;position:sticky;top:0;z-index:50}
.mob-header h2{color:#fff;font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:8px}

/* RESPONSIVE */
@media(max-width:900px){.dg{grid-template-columns:1fr}.features{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
.layout{flex-direction:column}
.side{position:fixed;top:0;left:-280px;width:270px;height:100vh;transition:left .25s ease;z-index:100}
.side.open{left:0}
.mob-header{display:flex!important}
.mh{display:none!important}
.mb{padding:16px}
.sinp{width:100%}
.hero h1{font-size:1.9rem}
.hero .sub{font-size:1rem}
.hero .desc{font-size:.92rem;margin-bottom:24px}
.features{grid-template-columns:1fr;gap:10px;max-width:340px}
.fc{padding:18px 14px}
.fc .ico{font-size:1.8rem;margin-bottom:6px}
.hero{padding:50px 16px 36px}
table{font-size:.86rem}
th,td{padding:10px}
.wc{padding:20px 16px}
.steps{gap:14px}
.auth-card{padding:28px 18px}
.mode-pick{grid-template-columns:1fr;gap:12px}
.mp-card{padding:22px 18px}
.ai-box{padding:18px}
.ai-ta{min-height:110px}
}
@media(max-width:480px){
.hero h1{font-size:1.55rem}
.hero .sub{font-size:.9rem}
.tg{gap:2px}
.tb{font-size:.62rem;border-width:1.5px}
.btn{font-size:.88rem;padding:0 16px;height:42px}
.steps{gap:8px;margin-bottom:20px;padding-bottom:16px}
.step{width:34px;height:34px;font-size:.85rem}
.ir{flex-direction:column;gap:2px}.iv{text-align:left}
}
@media(min-width:769px){.mob-header{display:none!important}.mob-search{display:none!important}}
@media(max-width:768px){.desk-only{display:none!important}.mob-search{display:block}.hide-sm{display:none!important}}
</style>
</head>

function render(){
var p=state.page,h='';
if(p==='landing')h=renderLanding();
else if(p==='register')h=renderAuth(true);
else if(p==='login')h=renderAuth(false);
else if(p==='orders')h=renderOrders();
else if(p.indexOf('order/')===0&&p!=='orders/new')h=renderDetail();
else if(p==='orders/new')h=renderNew();
else if(p==='profile')h=renderProfile();
else h=renderOrders();
Q('#app').innerHTML=h;}

else{state.user={name:'Dr. Kovács János',email:'kovacs@rendelo.hu',clinic:'Kovács Fogászat'};}
nav('orders');}

function togTooth(t){var i=state.selTeeth.indexOf(t);if(i>-1)state.selTeeth.splice(i,1);else state.selTeeth.push(t);state.selTeeth.sort(function(a,b){return a-b});render();}
function selQ(q){if(q==='upper')state.selTeeth=upperT.slice();else state.selTeeth=lowerT.slice();render();}
function addProd(){if(!state.nd.prod)return alert('Válassz terméket!');state.products.push({n:state.nd.prod,c:state.nd.cat,t:state.selTeeth.slice()});state.selTeeth=[];state.nd.prod='';render();}
function resetNew(){state.step=1;state.orderDone=false;state.selTeeth=[];state.products=[];state.aiMode=null;state.aiText='';state.aiParsed=null;state.aiLoading=false;state.nd={pn:'',pa:'',pg:'',cat:'',prod:'',col:'',notes:'',lab:'',lbn:'',lbe:'',dl:''};}

function parseAiText(txt){
var t=txt.toLowerCase(),res={pn:'',pa:'',pg:'',cat:'',prod:'',col:'',notes:'',lab:'',teeth:[],products:[]};
var nm=txt.match(/(?:páciens|beteg|névre)[:\s]+([A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű]+\s+[A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű]+)/i);
if(nm)res.pn=nm[1];
else{var nms=txt.match(/([A-ZÁÉÍÓÖŐÚÜŰ][a-záéíóöőúüű]+)\s+([A-ZÁÉÍÓÖŐÚÜŰ][a-záéíóöőúüű]+)/);if(nms)res.pn=nms[0];}
var yr=txt.match(/(?:szül|szület|born)[^\d]*(\d{4})/i);if(yr)res.pa=yr[1];
else{var yr2=txt.match(/(\d{4})[\.\-\/]\d{1,2}[\.\-\/]\d{1,2}/);if(yr2)res.pa=yr2[1];}
var ageM=txt.match(/(\d{1,3})\s*éves/i);if(ageM&&!res.pa){var ag=parseInt(ageM[1]);if(ag>0&&ag<120)res.pa=''+(2026-ag);}
if(t.indexOf('nő')>-1||t.indexOf('hölgy')>-1||t.indexOf('female')>-1)res.pg='Nő';
else if(t.indexOf('férfi')>-1||t.indexOf('úr')>-1||t.indexOf('male')>-1)res.pg='Férfi';
var colorM=txt.match(/(?:szín|vita|shade)[:\s]*([ABCD][1-4](?:\.5)?)/i);
if(!colorM)colorM=txt.match(/\b([ABCD][1-4](?:\.5)?)\b/);
if(colorM){var cv=colorM[1].toUpperCase();if(vitaColors.indexOf(cv)>-1)res.col=cv;}
var fdi=txt.match(/\b([1-4][1-8])\b/g);
if(fdi){fdi.forEach(function(f){var n=parseInt(f);if(n>=11&&n<=48&&n%10>=1&&n%10<=8&&res.teeth.indexOf(n)===-1)res.teeth.push(n);});res.teeth.sort(function(a,b){return a-b});}
var kwMap={cirkon:['Korona','Cirkon korona'],'cirkónium':['Korona','Cirkon korona'],'zirconia':['Korona','Cirkon korona'],'fém-kerámia':['Korona','Fém-kerámia korona'],'fémkerámia':['Korona','Fém-kerámia korona'],'e.max':['Korona','E.max korona'],'emax':['Korona','E.max korona'],'korona':['Korona','Cirkon korona'],'crown':['Korona','Cirkon korona'],'híd':['Híd','Cirkon híd'],'bridge':['Híd','Cirkon híd'],'héj':['Héj','Préskerámia'],'veneer':['Héj','Préskerámia'],'préskerámia':['Héj','Préskerámia'],'inlay':['Inlay','Kerámia inlay'],'kompozit inlay':['Inlay','Kompozit'],'implant':['Implantátum','Alpha Bio felépítmény'],'protézis':['Egyéb','Harapásemelő sín'],'harapás':['Egyéb','Harapásemelő sín']};
for(var kw in kwMap){if(t.indexOf(kw)>-1){res.cat=kwMap[kw][0];res.prod=kwMap[kw][1];break;}}
var labM=txt.match(/(?:labor|lab)[:\s]+([A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű\s]+?)(?:\.|,|$)/i);
if(labM){var labN=labM[1].trim();labs.forEach(function(l){if(l.toLowerCase().indexOf(labN.toLowerCase())>-1||labN.toLowerCase().indexOf(l.toLowerCase().split(' ')[0])>-1)res.lab=l;});}
res.notes=txt;
if(res.teeth.length&&res.prod){res.products=[{n:res.prod,c:res.cat,t:res.teeth.slice()}];}
else if(res.prod){res.products=[{n:res.prod,c:res.cat,t:[]}];}
return res;}

function startAiProcess(){
state.aiText=Q('#ai-input')?Q('#ai-input').value:state.aiText;
if(!state.aiText.trim())return alert('Írj be szöveget!');
state.aiLoading=true;render();
setTimeout(function(){
var p=parseAiText(state.aiText);
state.aiParsed=p;state.aiLoading=false;
state.nd.pn=p.pn;state.nd.pa=p.pa;state.nd.pg=p.pg;state.nd.cat=p.cat;state.nd.prod=p.prod;state.nd.col=p.col;state.nd.notes=p.notes;state.nd.lab=p.lab;
state.selTeeth=p.teeth.slice();state.products=p.products.slice();
render();},1500);}

function aiAccept(){state.aiMode='review';state.step=1;render();}

window.onhashchange=function(){var h=window.location.hash.slice(2);if(h)state.page=h;render();};
(function(){var h=window.location.hash.slice(2);if(h)state.page=h;render();})();
</script>
