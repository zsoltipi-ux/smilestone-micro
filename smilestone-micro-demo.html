<style>
:root{--c:#0d9488;--ch:#0f766e;--cl:#14b8a6;--sb:#1e293b;--bg:#f8fafc;--wh:#fff;--bd:#e2e8f0;--tx:#1e293b;--tl:#64748b;--ok:#10b981;--inf:#3b82f6;--gr:#94a3b8;--sh:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
a{color:var(--c);text-decoration:none;cursor:pointer}a:hover{color:var(--ch)}
button{border:none;cursor:pointer;font-family:inherit;transition:all .2s}
input,select,textarea{font-family:inherit;border:1px solid var(--bd);border-radius:8px;padding:0 12px;height:42px;transition:all .2s;width:100%;font-size:.95rem}
textarea{padding:12px;height:auto;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.card{background:var(--wh);border-radius:12px;padding:24px;box-shadow:var(--sh)}
.badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:.85rem;font-weight:600}
.b-ok{background:rgba(16,185,129,.1);color:var(--ok)}.b-inf{background:rgba(59,130,246,.1);color:var(--inf)}.b-gr{background:rgba(148,163,184,.1);color:var(--gr)}
.btn{height:42px;padding:0 24px;border-radius:8px;font-weight:600;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none}
.btn-p{background:var(--c);color:#fff}.btn-p:hover{background:var(--ch)}
.btn-s{background:#fff;color:var(--tx);border:2px solid var(--bd)}.btn-s:hover{border-color:var(--c);color:var(--c)}
.btn-o{background:transparent;color:#fff;border:2px solid #fff}.btn-o:hover{background:#fff;color:var(--c)}
.btn-sm{height:36px;padding:0 16px;font-size:.85rem}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap24{gap:24px}
.wrap{flex-wrap:wrap}.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.col{flex-direction:column}.w100{width:100%}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}.mb32{margin-bottom:32px}
.mt16{margin-top:16px}.mt24{margin-top:24px}
.tac{text-align:center}.tar{text-align:right}
.hidden{display:none!important}

.hero{background:linear-gradient(135deg,var(--c) 0%,var(--ch) 100%);color:#fff;padding:100px 24px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;text-align:center}
.hero h1{font-size:3.2rem;margin-bottom:12px;font-weight:800}.hero .sub{font-size:1.4rem;margin-bottom:12px;opacity:.95}
.hero .desc{font-size:1.05rem;margin-bottom:48px;max-width:580px;margin-left:auto;margin-right:auto;opacity:.9}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:1100px;margin:0 auto;padding:0 24px}
.fc{background:#fff;padding:32px 24px;border-radius:12px;text-align:center;box-shadow:var(--sh)}
.fc .ico{font-size:2.8rem;margin-bottom:12px}.fc h3{font-size:1.15rem;margin-bottom:8px;color:var(--tx)}.fc p{color:var(--tl);font-size:.95rem}

.auth{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;background:var(--bg)}
.auth-card{background:#fff;border-radius:12px;padding:48px 32px;box-shadow:0 4px 6px rgba(0,0,0,.1);max-width:440px;width:100%}
.auth-card h1{text-align:center;margin-bottom:32px;font-size:1.8rem}
.fg{margin-bottom:20px}.fg label{display:block;margin-bottom:8px;font-weight:600;font-size:.95rem}

.layout{display:flex;min-height:100vh}
.side{width:240px;background:var(--sb);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.side-brand{padding:0 24px 24px;font-size:1.1rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:24px}
.side-nav{flex:1;padding:0 12px}
.si{display:block;width:100%;padding:12px 16px;margin-bottom:8px;background:transparent;color:rgba(255,255,255,.7);border-radius:8px;text-align:left;font-size:.95rem;border:none;cursor:pointer;position:relative}
.si:hover{background:rgba(255,255,255,.1);color:#fff}.si.act{background:var(--c);color:#fff}
.si.lk{opacity:.5;cursor:not-allowed}.si .tip{visibility:hidden;background:#1f2937;color:#fff;text-align:center;padding:6px 12px;border-radius:6px;position:absolute;z-index:9;bottom:125%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.8rem;opacity:0;transition:opacity .2s;pointer-events:none}
.si .tip::after{content:"";position:absolute;top:100%;left:50%;margin-left:-5px;border:5px solid transparent;border-top-color:#1f2937}
.si.lk:hover .tip{visibility:visible;opacity:1}
.side-div{height:1px;background:rgba(255,255,255,.1);margin:24px 12px}
.side-bot{padding:12px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.main{flex:1;overflow-y:auto}
.mh{background:#fff;padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mh h2{font-size:1.4rem}
.mb{padding:24px}
.sinp{width:280px;max-width:100%}

.ftabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.ft{padding:8px 16px;border-radius:6px;border:1px solid var(--bd);background:#fff;color:var(--tx);font-weight:600;cursor:pointer;font-size:.9rem}
.ft.act{background:var(--c);color:#fff;border-color:var(--c)}.ft:hover{border-color:var(--c)}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
thead{background:var(--bg)}th{padding:14px 16px;text-align:left;font-weight:700;border-bottom:1px solid var(--bd)}
td{padding:14px 16px;border-bottom:1px solid var(--bd)}tbody tr{transition:background .2s;cursor:pointer}tbody tr:hover{background:var(--bg)}

.oid{color:var(--c);font-weight:600}.oid:hover{text-decoration:underline}
.pgn{text-align:right;color:var(--tl);font-size:.9rem;margin-top:12px}

.bk{display:inline-flex;align-items:center;gap:8px;margin-bottom:24px;color:var(--c);font-weight:600;cursor:pointer}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:768px){.dg{grid-template-columns:1fr}.layout{flex-direction:column}.side{width:100%;height:auto;position:static}.sinp{width:100%}}
.ir{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd)}.ir:last-child{border-bottom:none}
.il{font-weight:600}.iv{color:var(--tl);text-align:right}
.ct{font-size:1.1rem;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.tl{list-style:none}.tli{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--bd)}.tli:last-child{border-bottom:none}

.tlc .nm{font-weight:600}.tlc .dt{font-size:.85rem;color:var(--tl)}.tlc .tt{margin-top:4px}

.wiz{max-width:800px;margin:0 auto}
.steps{display:flex;justify-content:center;gap:40px;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid var(--bd)}
.step{width:48px;height:48px;border-radius:50%;background:var(--bd);color:var(--tl);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;transition:all .2s}
.step.act{background:var(--c);color:#fff}.step.done{background:var(--ok);color:#fff}
.wc{background:#fff;border-radius:12px;padding:32px;box-shadow:var(--sh);margin-bottom:24px}.wc h2{font-size:1.3rem;margin-bottom:24px}

.tc{background:#fff;border-radius:12px;padding:24px;box-shadow:var(--sh);margin-bottom:24px}
.tc-t{font-size:1.05rem;font-weight:700;margin-bottom:16px}
.tg{display:grid;grid-template-columns:repeat(8,1fr) 4px repeat(8,1fr);gap:4px;margin-bottom:16px}
.tb{width:100%;aspect-ratio:1;border-radius:6px;border:2px solid var(--bd);background:#fff;color:var(--tx);font-weight:600;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.tb:hover{background:#f0fdfa;border-color:var(--c)}.tb.sel{background:var(--c);color:#fff;border-color:var(--c)}
.tdv{background:var(--bd)}
.thr{grid-column:1/-1;height:2px;background:var(--bd)}
.tql{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.85rem;color:var(--tl);text-align:center;margin-top:12px}
.st{background:var(--bg);padding:10px 12px;border-radius:8px;margin-top:12px;font-size:.9rem;color:var(--tl)}
.pi{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.pd{background:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px;border:none}
.drop{border:2px dashed var(--bd);border-radius:8px;padding:32px;text-align:center;background:var(--bg);cursor:pointer;color:var(--tl)}
.suc{max-width:560px;margin:0 auto;text-align:center}.suc .si2{font-size:3.5rem;margin-bottom:20px}
.suc h2{font-size:1.6rem;margin-bottom:10px}.suc p{color:var(--tl);margin-bottom:28px}
.mode-pick{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:700px;margin:0 auto}
.mp-card{background:#fff;border-radius:16px;padding:40px 28px;box-shadow:var(--sh);cursor:pointer;border:3px solid transparent;transition:all .25s;text-align:center}
.mp-card:hover{border-color:var(--c);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.mp-card .mp-ico{font-size:3rem;margin-bottom:16px}.mp-card h3{font-size:1.2rem;margin-bottom:8px}.mp-card p{color:var(--tl);font-size:.9rem;line-height:1.5}
.ai-box{background:#fff;border-radius:12px;padding:32px;box-shadow:var(--sh);max-width:800px;margin:0 auto}
.ai-box h2{font-size:1.3rem;margin-bottom:8px}.ai-box .ai-sub{color:var(--tl);margin-bottom:24px;font-size:.95rem}
.ai-ta{width:100%;min-height:180px;border:2px solid var(--bd);border-radius:10px;padding:16px;font-size:1rem;line-height:1.7;resize:vertical;font-family:inherit}
.ai-ta:focus{border-color:var(--c);box-shadow:0 0 0 3px rgba(13,148,136,.1);outline:none}
.ai-ta::placeholder{color:#94a3b8}
.ai-hint{background:var(--bg);border-radius:8px;padding:14px 16px;margin-top:16px;font-size:.88rem;color:var(--tl);line-height:1.6}
.ai-hint strong{color:var(--tx)}
.ai-loading{text-align:center;padding:60px 24px}
.ai-loading .spinner{width:48px;height:48px;border:4px solid var(--bd);border-top-color:var(--c);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-result{background:#fff;border-radius:12px;padding:32px;box-shadow:var(--sh);max-width:800px;margin:0 auto}
.ai-result h2{font-size:1.3rem;margin-bottom:24px}
.ai-parsed{background:linear-gradient(135deg,#f0fdfa 0%,#ecfdf5 100%);border:1px solid rgba(13,148,136,.2);border-radius:10px;padding:20px;margin-bottom:24px}
.ai-parsed .ap-title{font-weight:700;color:var(--c);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-field{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(13,148,136,.1)}.ai-field:last-child{border:none}
.ai-field .af-l{font-weight:600;color:var(--tx)}.ai-field .af-v{color:var(--tl);text-align:right;max-width:60%}
.ai-edit-note{font-size:.85rem;color:var(--tl);text-align:center;margin-bottom:16px;font-style:italic}
@media(max-width:600px){.mode-pick{grid-template-columns:1fr}}
</style>

function parseAiText(txt){
var t=txt.toLowerCase(),res={pn:'',pa:'',pg:'',cat:'',prod:'',col:'',notes:'',lab:'',teeth:[],products:[]};
var nm=txt.match(/(?:páciens|beteg|névre)[:\s]+([A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű]+\s+[A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű]+)/i);
if(nm)res.pn=nm[1];
else{var nms=txt.match(/([A-ZÁÉÍÓÖŐÚÜŰ][a-záéíóöőúüű]+)\s+([A-ZÁÉÍÓÖŐÚÜŰ][a-záéíóöőúüű]+)/);if(nms)res.pn=nms[0];}
var yr=txt.match(/(?:szül|szület|born)[^\d]*(\d{4})/i);if(yr)res.pa=yr[1];
else{var yr2=txt.match(/(\d{4})[\.\-\/]\d{1,2}[\.\-\/]\d{1,2}/);if(yr2)res.pa=yr2[1];}
if(t.indexOf('nő')>-1||t.indexOf('hölgy')>-1||t.indexOf('female')>-1)res.pg='Nő';
else if(t.indexOf('férfi')>-1||t.indexOf('úr')>-1||t.indexOf('male')>-1)res.pg='Férfi';
var colorM=txt.match(/(?:szín|vita|shade)[:\s]*([ABCD][1-4](?:\.5)?)/i);
if(!colorM)colorM=txt.match(/\b([ABCD][1-4](?:\.5)?)\b/);
if(colorM){var cv=colorM[1].toUpperCase();if(vitaColors.indexOf(cv)>-1)res.col=cv;}
var fdi=txt.match(/\b([1-4][1-8])\b/g);
if(fdi){fdi.forEach(function(f){var n=parseInt(f);if(n>=11&&n<=48&&n%10>=1&&n%10<=8&&res.teeth.indexOf(n)===-1)res.teeth.push(n);});res.teeth.sort(function(a,b){return a-b});}
var kwMap={cirkon:['Korona','Cirkon korona'],'cirkónium':['Korona','Cirkon korona'],'zirconia':['Korona','Cirkon korona'],'fém-kerámia':['Korona','Fém-kerámia korona'],'fémkerámia':['Korona','Fém-kerámia korona'],'e.max':['Korona','E.max korona'],'emax':['Korona','E.max korona'],'korona':['Korona','Cirkon korona'],'crown':['Korona','Cirkon korona'],'híd':['Híd','Cirkon híd'],'bridge':['Híd','Cirkon híd'],'héj':['Héj','Préskerámia'],'veneer':['Héj','Préskerámia'],'préskerámia':['Héj','Préskerámia'],'inlay':['Inlay','Kerámia inlay'],'kompozit inlay':['Inlay','Kompozit'],'implant':['Implantátum','Alpha Bio felépítmény'],'protézis':['Egyéb','Harapásemelő sín'],'harapás':['Egyéb','Harapásemelő sín']};
for(var kw in kwMap){if(t.indexOf(kw)>-1){res.cat=kwMap[kw][0];res.prod=kwMap[kw][1];break;}}
var labM=txt.match(/(?:labor|lab)[:\s]+([A-ZÁÉÍÓÖŐÚÜŰa-záéíóöőúüű\s]+?)(?:\.|,|$)/i);
if(labM){var labN=labM[1].trim();labs.forEach(function(l){if(l.toLowerCase().indexOf(labN.toLowerCase())>-1||labN.toLowerCase().indexOf(l.toLowerCase().split(' ')[0])>-1)res.lab=l;});}
res.notes=txt;
if(res.teeth.length&&res.prod){res.products=[{n:res.prod,c:res.cat,t:res.teeth.slice()}];}
else if(res.prod){res.products=[{n:res.prod,c:res.cat,t:[]}];}
return res;}

function startAiProcess(){
state.aiText=Q('#ai-input')?Q('#ai-input').value:state.aiText;
if(!state.aiText.trim())return alert('Írj be szöveget a feldolgozáshoz!');
state.aiLoading=true;render();
setTimeout(function(){
var p=parseAiText(state.aiText);
state.aiParsed=p;state.aiLoading=false;
state.nd.pn=p.pn;state.nd.pa=p.pa;state.nd.pg=p.pg;state.nd.cat=p.cat;state.nd.prod=p.prod;state.nd.col=p.col;state.nd.notes=p.notes;state.nd.lab=p.lab;
state.selTeeth=p.teeth.slice();state.products=p.products.slice();
render();},1500);}
